<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viktoria AI · Asistente Udhëtimi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f5f0;
  --surface: #ffffff;
  --border: #e8e0d4;
  --text: #1a1410;
  --muted: #8a7d6e;
  --accent: #2d5a8e;
  --accent-light: #e8f0f8;
  --accent-border: #b8cfe8;
  --gold: #c8922a;
  --radius: 12px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.container {
  width: 100%;
  max-width: 680px;
  height: 90vh;
  max-height: 760px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 4px 40px rgba(0,0,0,0.08);
}

.header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
}

.logo {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: white;
}

.header-info h1 {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 500;
  color: var(--text);
}
.header-info p {
  font-size: 12px;
  color: var(--muted);
}

.online {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: #4a9e6b;
}
.online::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: currentColor;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.msg {
  display: flex;
  gap: 10px;
  animation: fadeUp 0.3s ease both;
}
.msg.user { flex-direction: row-reverse; }

.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 500;
  margin-top: 2px;
}
.msg.ai .avatar { background: var(--accent-light); color: var(--accent); }
.msg.user .avatar { background: #f0ebe4; color: var(--muted); }

.bubble {
  max-width: 78%;
  padding: 11px 15px;
  font-size: 14px;
  line-height: 1.65;
  color: var(--text);
}
.msg.ai .bubble {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
}
.msg.user .bubble {
  background: var(--accent);
  color: white;
  border-radius: 14px 4px 14px 14px;
}

.flights-card {
  margin-top: 12px;
  border: 1px solid var(--accent-border);
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface);
}
.flights-header {
  padding: 10px 14px;
  background: var(--accent-light);
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 6px;
}
.flight-row {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}
.flight-price {
  font-weight: 500;
  color: var(--gold);
  font-size: 15px;
}
.flight-info {
  font-size: 12px;
  color: var(--muted);
}
.btn-flights {
  display: block;
  margin: 10px 14px 12px;
  padding: 9px 16px;
  background: var(--accent);
  color: white;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  text-align: center;
  transition: opacity 0.2s;
}
.btn-flights:hover { opacity: 0.88; }

.chips {
  padding: 0 20px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}
.chip {
  padding: 5px 13px;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 12px;
  color: var(--muted);
  background: transparent;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }

.input-area {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}
.input-area textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 100px;
  line-height: 1.4;
  transition: border-color 0.2s;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area textarea::placeholder { color: var(--muted); }

.send-btn {
  width: 42px;
  height: 42px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
.send-btn:hover { opacity: 0.88; }
.send-btn svg { width: 16px; height: 16px; fill: white; }

.typing {
  display: flex;
  gap: 10px;
  align-items: center;
}
.typing-dots {
  padding: 12px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  display: flex;
  gap: 4px;
}
.typing-dots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--muted);
  animation: blink 1.2s ease infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

.powered {
  text-align: center;
  font-size: 10px;
  color: var(--border);
  margin-top: 8px;
  letter-spacing: 0.1em;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes blink {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">V</div>
    <div class="header-info">
      <h1>Viktoria AI</h1>
      <p>Asistente udhëtimi · Viktoria Travel</p>
    </div>
    <div class="online">online</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="chips" id="chips">
    <button class="chip" onclick="chip('Dua të udhëtoj në Maltë')">Maltë</button>
    <button class="chip" onclick="chip('Dua të udhëtoj në Berlin')">Berlin</button>
    <button class="chip" onclick="chip('Dua të udhëtoj në Greqi')">Greqi</button>
    <button class="chip" onclick="chip('Dua të udhëtoj në Dubai')">Dubai</button>
    <button class="chip" onclick="chip('Dua të udhëtoj në Barcelonë')">Barcelonë</button>
  </div>

  <div class="input-area">
    <textarea id="inp" placeholder="Ku dëshiron të udhëtosh?" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
    <button class="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<p class="powered">VIKTORIA TRAVEL · AI nga Gemini</p>

<script>
const history = [];

function addMsg(role, text, flights, affiliateUrl) {
  const chat = document.getElementById('chat');
  document.getElementById('chips').style.display = 'none';
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  const isAI = role === 'ai';

  let flightsHTML = '';
  if (flights && flights.length > 0 && affiliateUrl) {
    flightsHTML = `
      <div class="flights-card">
        <div class="flights-header">✈ Çmimet e fluturimeve (live)</div>
        ${flights.map(f => `
          <div class="flight-row">
            <div>
              <div style="font-weight:500">${f.airline || 'Airline'}</div>
              <div class="flight-info">${f.stops === 0 ? 'Direkt' : f.stops + ' ndalesë'} · ${f.departure ? new Date(f.departure).toLocaleDateString('sq-AL') : ''}</div>
            </div>
            <div class="flight-price">€${f.price}</div>
          </div>
        `).join('')}
        <a href="${affiliateUrl}" target="_blank" class="btn-flights">Rezervo fluturimin →</a>
      </div>`;
  } else if (affiliateUrl && role === 'ai' && text.toLowerCase().includes('flutur')) {
    flightsHTML = `<div style="margin-top:12px"><a href="${affiliateUrl}" target="_blank" class="btn-flights">Kërko fluturime →</a></div>`;
  }

  d.innerHTML = `
    <div class="avatar">${isAI ? 'V' : 'Ti'}</div>
    <div class="bubble">${text.replace(/\n/g,'<br>')}${isAI ? flightsHTML : ''}</div>
  `;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.id = 'typing';
  d.className = 'typing';
  d.innerHTML = `
    <div class="avatar" style="background:#e8f0f8;color:#2d5a8e">V</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  `;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

async function callAPI(userMsg) {
  history.push({ role: 'user', content: userMsg });
  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    document.getElementById('typing')?.remove();
    history.push({ role: 'assistant', content: data.text });
    addMsg('ai', data.text, data.flights, data.affiliateUrl);
  } catch(e) {
    document.getElementById('typing')?.remove();
    addMsg('ai', 'Ndodhi një gabim teknik. Ju lutem provoni përsëri.');
  }
}

function send() {
  const inp = document.getElementById('inp');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  inp.style.height = 'auto';
  addMsg('user', msg);
  callAPI(msg);
}

function chip(txt) {
  addMsg('user', txt);
  callAPI(txt);
}

// Welcome message
addMsg('ai', 'Ej! Unë jam Viktoria, asistentja juaj e udhëtimit nga Viktoria Travel. Ku dëshironi të shkoni sot? 😊');
</script>
</body>
</html>
